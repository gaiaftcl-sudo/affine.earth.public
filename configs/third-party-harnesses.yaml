version: 1
provider:
  api_style: openai-compatible
  base_url_env_priority:
    - AFFINE_HARNESS_ENDPOINT
    - AFFINE_OPENAI_BASE_URL
    - OPENAI_BASE_URL
    - AFFINE_BASE_URL
  api_key_env_priority:
    - OPENAI_API_KEY
    - AFFINE_HARNESS_API_KEY
  model_env_priority:
    - AFFINE_HARNESS_MODEL
    - AFFINE_MODEL
    - OPENAI_MODEL
  preflight_path: /models
  preflight_requires_json: true
  known_non_json_endpoint_note: >-
    https://affine.earth/v1 returns an HTML SPA as of 2026-07-20.
    Use a real OpenAI-compatible /v1 or a local interceptor for wiring only.
artifacts:
  root: reports/third_party
harnesses:
  lm_evaluation_harness:
    wrapper_name: lm-eval
    upstream: https://github.com/EleutherAI/lm-evaluation-harness
    package_pin: lm-eval==0.4.7
    install: |
      python3 -m venv .venv/lm-eval
      . .venv/lm-eval/bin/activate
      python -m pip install --upgrade pip
      python -m pip install "lm-eval==0.4.7"
    cli: lm_eval
    api_model: local-chat-completions
    tasks: [mmlu, gsm8k]
    output: reports/third_party/lm_eval
  bigcode_evaluation_harness:
    wrapper_name: bigcode
    upstream: https://github.com/bigcode-project/bigcode-evaluation-harness
    revision: v0.1.0
    install: |
      git clone --branch v0.1.0 --depth 1 \
        https://github.com/bigcode-project/bigcode-evaluation-harness.git \
        harnesses/bigcode-evaluation-harness
      python3 -m venv .venv/bigcode
      . .venv/bigcode/bin/activate
      python -m pip install --upgrade pip
      python -m pip install -e harnesses/bigcode-evaluation-harness
    entrypoint: main.py
    tasks: [humaneval, mbpp]
    output: reports/third_party/bigcode/results.json
    provider_note: >-
      Upstream v0.1.0 loads a Hugging Face checkpoint/local path, or scores
      pre-generated completions via --load_generations_path. It has no native
      OpenAI-compatible generation backend.
  fastchat_mt_bench:
    wrapper_name: fastchat
    upstream: https://github.com/lm-sys/FastChat
    package_pin: fschat==0.2.36
    revision_tag: v0.2.36
    install: |
      python3 -m venv .venv/fastchat
      . .venv/fastchat/bin/activate
      python -m pip install --upgrade pip
      python -m pip install "fschat==0.2.36"
    generation_entrypoint: fastchat.llm_judge.gen_api_answer
    judging_entrypoint: fastchat.llm_judge.gen_judgment
    bench: mt_bench
    answer_output: reports/third_party/fastchat/mt-bench-answers.jsonl
  # Hardest / open-AGI targets — full registry in configs/open-agi-harnesses.yaml
  # Launcher: bin/run-open-agi-harnesses.sh
  open_agi_gpqa_via_lm_eval:
    wrapper_name: gpqa
    suite_id: open_agi_gpqa
    via: lm_evaluation_harness
    package_pin: lm-eval==0.4.7
    tasks: [gpqa_diamond_cot_zeroshot]
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_bbh_via_lm_eval:
    wrapper_name: bbh
    suite_id: open_agi_bbh
    tasks: [bbh_cot_fewshot]
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_mmlu_pro_via_lm_eval:
    wrapper_name: mmlu-pro
    suite_id: open_agi_mmlu_pro
    tasks: [mmlu_pro]
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_lm_eval_hard:
    wrapper_name: lm-eval-hard
    suite_id: open_agi_lm_eval_hard
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_hle:
    wrapper_name: hle
    suite_id: open_agi_hle
    upstream: https://github.com/centerforaisafety/hle
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_arc_agi:
    wrapper_name: arc-agi
    suite_id: open_agi_arc_agi
    upstream: https://github.com/arcprize/arc-agi-benchmarking
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_arc_agi_2:
    wrapper_name: arc-agi-2
    suite_id: open_agi_arc_agi_2
    upstream_data: https://github.com/arcprize/ARC-AGI-2
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_gaia:
    wrapper_name: gaia
    suite_id: open_agi_gaia
    upstream_evals: https://github.com/UKGovernmentBEIS/inspect_evals
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_inspect_gpqa:
    wrapper_name: inspect-gpqa
    suite_id: open_agi_inspect_gpqa
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_livecodebench:
    wrapper_name: livecodebench
    suite_id: open_agi_livecodebench
    status: RUNNABLE_WRAPPER
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_swe_bench:
    wrapper_name: swe-bench
    suite_id: open_agi_swe_bench
    status: RUNNABLE_WRAPPER
    notes: requires SWE_BENCH_PREDICTIONS_PATH
    open_agi_registry: configs/open-agi-harnesses.yaml
  open_agi_frontiermath:
    wrapper_name: frontiermath
    suite_id: open_agi_frontiermath
    status: NEEDS_UPSTREAM
    open_agi_registry: configs/open-agi-harnesses.yaml
